<!DOCTYPE html>
<html lang="en">
  <!--<< Header Area >>-->

  <head>
    <!-- ========== Meta Tags ========== -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="namespace-it" />
    <meta name="description" content="AIForge - AI Startup & Technology HTML Template" />
    <!-- ======== Page title ============ -->
    <title>AIForge - AI Startup & Technology HTML Template</title>
    <!--<< Favcion >>-->
    <link rel="shortcut icon" href="assets/img/favicon.svg" />
    <!--<< Bootstrap min.css >>-->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <!--<< All Min Css >>-->
    <link rel="stylesheet" href="assets/css/all.min.css" />
    <!--<< Animate.css >>-->
    <link rel="stylesheet" href="assets/css/animate.css" />
    <!--<< Magnific Popup.css >>-->
    <link rel="stylesheet" href="assets/css/magnific-popup.css" />
    <!--<< MeanMenu.css >>-->
    <link rel="stylesheet" href="assets/css/meanmenu.css" />
    <!--<< Swiper Bundle.css >>-->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
    <!--<< Nice Select.css >>-->
    <link rel="stylesheet" href="assets/css/nice-select.css" />
    <!--<< Color.css >>-->
    <link rel="stylesheet" href="assets/css/color.css" />
    <!--<< Main.css >>-->
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>

  <body class="body-bg">
    <!-- Preloader Start -->
    <div id="preloader" class="preloader">
      <div class="animation-preloader">
        <div class="spinner"></div>
        <div class="txt-loading">
          <span data-text-preloader="A" class="letters-loading"> A </span>
          <span data-text-preloader="I" class="letters-loading"> I </span>
          <span data-text-preloader="F" class="letters-loading"> F </span>
          <span data-text-preloader="O" class="letters-loading"> O </span>
          <span data-text-preloader="R" class="letters-loading"> R </span>
          <span data-text-preloader="G" class="letters-loading"> G </span>
          <span data-text-preloader="E" class="letters-loading"> E </span>
        </div>
        <p class="text-center">Loading</p>
      </div>
      <div class="loader">
        <div class="row">
          <div class="col-3 loader-section section-left">
            <div class="bg"></div>
          </div>
          <div class="col-3 loader-section section-left">
            <div class="bg"></div>
          </div>
          <div class="col-3 loader-section section-right">
            <div class="bg"></div>
          </div>
          <div class="col-3 loader-section section-right">
            <div class="bg"></div>
          </div>
        </div>
      </div>
    </div>

    <!--<< Mouse Cursor Start >>-->
    <div class="mouse-cursor cursor-outer"></div>
    <div class="mouse-cursor cursor-inner"></div>

    <!-- Back To Top start -->
    <button id="back-top" class="back-to-top">
      <i class="fa-regular fa-arrow-up"></i>
    </button>

        <div id="site-header"></div>
<!-- Login Section Start -->
    <section
      class="login-section section-padding fix bg-cover"
      style="background-image: url('assets/img/service/Pattern.png')"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-12">
            <div class="login-wrapper">
              <div class="row">
                <div class="col-xl-6">
                  <div class="sign-img">
                    <img src="assets/img/sign-image.jpg" alt="img" />
                  </div>
                </div>
                <div class="col-xl-6">
                  <div class="signin-item">
                    <div class="sign-header">
                      <h3>Sign in AIForge</h3>
                      <p>Choose on following sign in method</p>
                    </div>
                    <div class="social-icon">
                      <a href="#"><i class="fa-brands fa-google"></i> Sign in with google</a>
                      <a href="#"><i class="fa-brands fa-apple"></i></a>
                      <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    </div>
                    <h5>or sign in using your email</h5>
                    <form action="#" class="mt-4">
                      <div class="input-item">
                        <span class="lable-text">Email Address</span>
                        <input id="email1" type="email" placeholder="info@example.com" />
                        <div class="icon">
                          <i class="fa-regular fa-envelope"></i>
                        </div>
                      </div>
                      <div class="input-item">
                        <span class="lable-text">Password</span>
                        <input id="password" type="password" placeholder="Password" />
                        <div class="icon">
                          <i class="fa-solid fa-eye-slash"></i>
                        </div>
                      </div>
                      <div class="form-check">
                        <div class="">
                          <input id="reviewcheck" name="reviewcheck" type="checkbox" />
                          <label class="form-check-label" for="reviewcheck"> Remember Me </label>
                        </div>
                        <span>Forgot your password?</span>
                      </div>
                      <div class="button-items">
                        <button type="submit" class="theme-btn">
                          Sign in <i class="fa-sharp fa-regular fa-arrow-up-right"></i>
                        </button>
                      </div>
                      <p>Don’t have an account?<a href="login.html">Sign Up</a></p>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer Section Start -->
        <div id="site-footer"></div>
<!--<< All JS Plugins >>-->
    <script src="assets/js/jquery-3.7.1.min.js"></script>
    <!--<< Viewport Js >>-->
    <script src="assets/js/viewport.jquery.js"></script>
    <!--<< Bootstrap Js >>-->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!--<< Nice Select Js >>-->
    <script src="assets/js/jquery.nice-select.min.js"></script>
    <!--<< Waypoints Js >>-->
    <script src="assets/js/jquery.waypoints.js"></script>
    <!--<< Counterup Js >>-->
    <script src="assets/js/jquery.counterup.min.js"></script>
    <!--<< Swiper Slider Js >>-->
    <script src="assets/js/swiper-bundle.min.js"></script>
    <!--<< MeanMenu Js >>-->
    <script src="assets/js/jquery.meanmenu.min.js"></script>
    <!--<< Magnific Popup Js >>-->
    <script src="assets/js/jquery.magnific-popup.min.js"></script>
    <!--<< Wow Animation Js >>-->
    <script src="assets/js/wow.min.js"></script>
    <!--<< Main.js >>-->
    <script src="/assets/js/includes.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
