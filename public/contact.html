    <!-- Contact Section Start -->
    <section
      class="contact-section fix style-padding section-padding bg-cover"
      style="background-image: url('assets/img/contact-bg.jpg')"
    >
      <div class="container">
        <div class="section-title text-center">
          <h6 class="wow fadeInUp"><img src="assets/img/star.png" alt="img" /> contact us</h6>
          <h2 class="wow fadeInUp" data-wow-delay=".3s">
            Contact our experts <br />

          </h2>
        </div>
        <div class="contact-wrapper">
          <div class="row align-items-center">
            <div class="col-lg-4 wow fadeInUp" data-wow-delay=".3s">
              <div class="contact-image">
                <img src="assets/img/contac-img-2.jpg" alt="img" />
              </div>
            </div>
            <div class="col-lg-8">
              <div class="contact-form-items-area">
                <h2 class="wow fadeInUp" data-wow-delay=".3s">We can help!</h2>
                <form
                  action="contact.php"
                  id="contact-form"
                  method="POST"
                  class="contact-form-items"
                >
                  <div class="row g-4">
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-user"></i>
                        </div>
                        <input type="text" name="name" id="name" placeholder="Your Name" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".5s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-phone"></i>
                        </div>
                        <input type="text" name="phone" id="phone" placeholder="Phone" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="text" name="email" id="email12" placeholder="Email" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".5s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-circle-question"></i>
                        </div>
                        <select name="subject" id="subject" class="nice-select">
                          <option value="General Inquiry" selected>General Inquiry</option>
                          <option value="Tech Support">Tech Support</option>
                          <option value="Services">Services</option>
                          <option value="Billing">Billing</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <textarea
                          name="message"
                          id="message"
                          placeholder="What can we help you with?"
                          required
                        ></textarea>
                        <div class="icon">
                          <i class="fa-regular fa-comment"></i>
                        </div>
                      </div>
                    </div>
                    <div class="col-lg-7 wow fadeInUp" data-wow-delay=".5s">
                      <button type="submit" class="theme-btn">
                        Send message <i class="fa-sharp fa-regular fa-arrow-up-right"></i>
                      </button>
                    </div>
                  </div>
                </form>
              </div>
