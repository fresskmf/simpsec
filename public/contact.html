    <section
      class="contact-section fix style-padding section-padding bg-cover"
      style="background-image: url('assets/img/contact-bg.jpg')"

      <div class="container">
        <div class="section-title text-center">
          <h6 class="wow fadeInUp"><img src="assets/img/star.png" alt="img" /> contact us</h6>

          </h2>
        </div>
        <div class="contact-wrapper">

            <div class="col-lg-4 wow fadeInUp" data-wow-delay=".3s">
              <div class="contact-image">
                <img src="assets/img/contac-img-2.jpg" alt="img" />
              </div>

            <div class="col-lg-8">
              <div class="contact-form-items-area">
                <h2 class="wow fadeInUp" data-wow-delay=".3s">We can help!</h2>
                <form
                  action="/api/case"
                  id="contact-form"
                  method="POST"
                  class="contact-form-items"
                >
                  <div class="row g-4">
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-user"></i>
                        </div>
                        <input type="text" name="name" id="name" placeholder="Your Name*" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".5s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-phone"></i>
                        </div>
                        <input type="text" name="phone" id="phone" placeholder="Phone*" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="text" name="email" id="email12" placeholder="Email*" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".5s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-building"></i>
                        </div>
                        <input type="text" name="company" id="company" placeholder="Company Name*" required />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-hashtag"></i>
                        </div>
                        <input type="text" name="contract_number" id="contract_number" placeholder="MSA Contract #" />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".5s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-circle-question"></i>
                        </div>
                        <select name="subject" id="subject" class="nice-select">
                          <option value="" selected disabled>Request Type*</option>
                          <option value="Incident">Incident (Something is broken/down)</option>
                          <option value="Service Request">Service Request (Need something done)</option>
                          <option value="Change Request">Change Request (Modify existing service)</option>
                          <option value="Billing / Invoice">Billing / Invoice</option>
                          <option value="Contract / Account">Contract / Account</option>
                          <option value="General Question">General Question</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-shield"></i>
                        </div>
                        <input type="text" name="affected_service" id="affected_service" placeholder="Affected Service" />
                      </div>
                    </div>
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay=".5s">
                      <div class="form-clt">
                        <div class="icon">

                          <option value="High">High — Major Impact</option>
                          <option value="Medium">Medium — Degraded</option>
                          <option value="Low">Low — Question / Request</option>

    <script>
      // Runs after main.js so nice-select is already initialized
      $(document).ready(function () {

        // Elevate open nice-select column above subsequent rows
        $('.contact-form-items .nice-select').each(function () {
          var el = this;
          new MutationObserver(function () {
            var col = el.closest('[class*="col-"]');
            if (col) col.style.zIndex = el.classList.contains('open') ? '100' : '';
          }).observe(el, { attributes: true, attributeFilter: ['class'] });
        });

        // Form submission — validates selects then POSTs JSON to /api/case
        $('#contact-form').on('submit', function (e) {
          e.preventDefault();

          var missing = [];
          if (!$('#subject').val()) missing.push('Request Type');
          if (!$('#severity').val()) missing.push('Severity');
          if (missing.length) {
            $('.form-message').removeClass('success').addClass('error')
              .text('Please select a value for: ' + missing.join(', '));
            return;
          }

          var msgEl    = $('.form-message');
          var submitBtn = $(this).find('[type="submit"]');
          submitBtn.prop('disabled', true);
          msgEl.removeClass('success error').text('');

          fetch('/api/case', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name:             $('#name').val().trim(),
              phone:            $('#phone').val().trim(),
              email:            $('#email12').val().trim(),
              company:          $('#company').val().trim(),
              contract_number:  $('#contract_number').val().trim(),
              subject:          $('#subject').val(),
              affected_service: $('#affected_service').val().trim(),
              severity:         $('#severity').val(),
              message:          $('#message').val().trim(),
            }),
          })
          .then(function (res) {
            return res.text().then(function (text) {
              return { ok: res.ok, text: text };
            });
          })
          .then(function (result) {
            if (result.ok) {
              msgEl.removeClass('error').addClass('success').text(result.text);
              $('#contact-form input, #contact-form textarea').val('');
              $('select.nice-select').val('').niceSelect('update');
            } else {
              msgEl.removeClass('success').addClass('error').text(result.text || 'Something went wrong. Please try again.');
              submitBtn.prop('disabled', false);
            }
          })
          .catch(function () {
            msgEl.removeClass('success').addClass('error')
              .text('Something went wrong. Please try again or email support@simpsec.org.');
            submitBtn.prop('disabled', false);
          });
        });
      });
    </script>
