    <!-- Contact Section Start -->
    <section
      class="contact-section fix style-padding section-padding bg-cover"
      style="background-image: url('assets/img/contact-bg.jpg')"
    >
      <div class="container">
        <div class="section-title ml-200">
          <h6 class="wow fadeInUp"><img src="assets/img/star.png" alt="img" /> Have an Inquiry?</h6>
          <h2 class="wow fadeInUp" data-wow-delay=".3s">
            Let us know
            <span>
              and our <br />
              <i>experts</i> will <b>reach out</b> soon.</span
            >
          </h2>
        </div>
        <div class="contact-wrapper">
          <div class="row align-items-center">
            <div class="col-lg-6 wow fadeInUp" data-wow-delay=".3s">
              <div class="contact-image">
                <img src="assets/img/inquiry-image.png" alt="img" />
              </div>
            </div>
            <div class="col-lg-6">
              <div class="inquiry-form-items-area">
                <form
                  action="inquiry.php"
                  id="inquiry-form"
                  method="POST"
                  action="#"
                  class="inquiry-form-items"
                >
                  <input type="hidden" name="pulse_source" value="" />
                  <input type="hidden" name="pulse_risk" value="" />
                  <input type="hidden" name="pulse_score" value="" />
                  <input type="hidden" name="pulse_gaps" value="" />
                  <input type="hidden" name="pulse_axis_risk_json" value="" />
                  <input type="hidden" name="pulse_axes_order_json" value="" />
                  <input type="hidden" name="inquiry_uid" id="inquiry_uid" value="" />

                  <div class="row g-3">
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-user"></i>
                        </div>
                        <input type="text" name="first_name" placeholder="First Name" required />
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-user"></i>
                        </div>
                        <input type="text" name="last_name" placeholder="Last Name" required />
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="email" name="email" placeholder="Email Address" required />
                      </div>
                    </div>

                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-phone"></i>
                        </div>
                        <input type="tel" name="phone" placeholder="Phone Number" required />
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-building"></i>
                        </div>
                        <input type="text" name="company" placeholder="Company Name" required />
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        <div class="icon">
                          <i class="fa-regular fa-briefcase"></i>
                        </div>
                        <input type="text" name="industry" placeholder="Industry" required />
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <div class="form-clt">
                        Interested in:
                        <div class="interest-pills">
                          <label class="pill">
                            <input
                              type="checkbox"
                              name="interested_in[]"
                              value="Cybersecurity"
                              required
                            />
                            <span>Cybersecurity</span>
                          </label>
                          <label class="pill">
                            <input type="checkbox" name="interested_in[]" value="AI Tools" />
                            <span>AI Tools</span>
                          </label>
                          <label class="pill">
                            <input type="checkbox" name="interested_in[]" value="IT Support" />
                            <span>IT Support</span>
                          </label>
                          <label class="pill">
                            <input type="checkbox" name="interested_in[]" value="Consulting" />
                            <span>Consulting</span>
                          </label>
                        </div>
                      </div>
                    </div>
                    <div class="col-lg-12 wow fadeInUp" data-wow-delay=".3s">
                      <button type="submit" class="theme-btn">Submit</button>
                    </div>
                  </div>
                </form>
              </div>
