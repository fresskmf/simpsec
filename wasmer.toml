[package]
name = "simpsec"
version = "0.1.0"
description = "SimpSec website"

[dependencies]
"wasmer/static-web-server" = "1"

[fs]
"/public" = "public"

[[command]]
name = "serve"
module = "wasmer/static-web-server:webserver"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["-p", "8080", "-d", "/public"]